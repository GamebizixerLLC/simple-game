<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی مار - Snake Game</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 4px solid #0f0; image-rendering: pixelated; }
        #score { font-size: 24px; margin-bottom: 10px; }
        #game-over { display: none; position: absolute; color: red; font-size: 48px; }
    </style>
</head>
<body>
    <h1>🎮 بازی مار</h1>
    <div id="score">امتیاز: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="game-over">Game Over!<br>امتیاز: <span id="final-score"></span><br>دوباره شروع کن (Space)</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameOver = false;
        let gameInterval;

        function drawGame() {
            if (gameOver) return;

            // Move snake
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Food eaten
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = `امتیاز: ${score}`;
                food = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)};
            } else {
                snake.pop();
            }

            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                    return;
                }
            }

            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            ctx.fillStyle = '#0f0';
            for (let segment of snake) {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
            }

            // Draw food
            ctx.fillStyle = '#f00';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameInterval);
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            food = {x: 15, y: 15};
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = 'امتیاز: 0';
            gameOver = false;
            gameOverElement.style.display = 'none';
            gameInterval = setInterval(drawGame, 100);
        }

        // Controls
        document.addEventListener('keydown', e => {
            if (gameOver && e.key === ' ') {
                resetGame();
                return;
            }
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': if (dy !== 1) { dx = 0; dy = -1; } break;
                case 'ArrowDown': case 's': case 'S': if (dy !== -1) { dx = 0; dy = 1; } break;
                case 'ArrowLeft': case 'a': case 'A': if (dx !== 1) { dx = -1; dy = 0; } break;
                case 'ArrowRight': case 'd': case 'D': if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        });

        // Start game
        resetGame();
    </script>
</body>
</html>
