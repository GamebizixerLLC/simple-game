<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی مار (Snake)</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
            color: white;
            flex-direction: column;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #game-over {
            position: absolute;
            display: none;
            font-size: 40px;
            color: red;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>بازی مار</h1>
    <div id="score">امتیاز: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="game-over">بازی تمام شد!<br>امتیاز: <span id="final-score"></span></div>
    <button onclick="restartGame()">شروع دوباره</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameSpeed = 100;

        function drawGame() {
            // Move snake
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }
            
            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Check if ate food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = `امتیاز: ${score}`;
                generateFood();
                // Increase speed slightly
                if (gameSpeed > 50) gameSpeed -= 2;
                clearInterval(gameInterval);
                gameInterval = setInterval(drawGame, gameSpeed);
            } else {
                snake.pop();
            }
            
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw snake
            ctx.fillStyle = '#0f0';
            for (let segment of snake) {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
            }
            
            // Draw food
            ctx.fillStyle = '#f00';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function endGame() {
            clearInterval(gameInterval);
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'block';
        }

        function restartGame() {
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            gameSpeed = 100;
            document.getElementById('score').textContent = 'امتیاز: 0';
            document.getElementById('game-over').style.display = 'none';
            generateFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(drawGame, gameSpeed);
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        // Start game
        generateFood();
        gameInterval = setInterval(drawGame, gameSpeed);
    </script>
</body>
</html>
